[AG: Brute Force Windows Logon]
search = search index=agentgate_demo_data sourcetype=windows:security EventCode=4625 | bucket _time span=5m | stats count by user, src_ip | where count >= 5
cron_schedule = */5 * * * *
description = [MITRE: T1110.001] [Compliance: PCI, SOX] Five or more failed Windows logon attempts within five minutes from a single source.
dispatch.earliest_time = -15m
dispatch.latest_time = now
enableSched = 1

[AG: Anomalous Geo Login]
search = search index=agentgate_demo_data sourcetype=windows:security EventCode=4624 LogonType=10 | iplocation src_ip | search Country!=US Country!=*
cron_schedule = */10 * * * *
description = [MITRE: T1078] [Compliance: PCI, SOX] Interactive logon from non-US geo to a corporate host.
dispatch.earliest_time = -1h
enableSched = 1

[AG: SQL Injection on Payment App]
search = search index=agentgate_demo_data sourcetype=web:access host=paymentapp01 | regex uri="(?i)(union\s+select|--|;\s*drop|or\s+1=1)" | stats count by clientip, uri
cron_schedule = */5 * * * *
description = [MITRE: T1190] [Compliance: PCI] SQL injection patterns against the payment application.
dispatch.earliest_time = -15m
enableSched = 1

[AG: Suspicious PowerShell EncodedCommand]
search = search index=agentgate_demo_data sourcetype=windows:security EventCode=4104 | regex ScriptBlockText="(?i)(invoke-expression|downloadstring|encodedcommand|frombase64string)"
cron_schedule = */10 * * * *
description = [MITRE: T1059.001] [Compliance: SOX, PCI] PowerShell script block with offensive primitives.
dispatch.earliest_time = -30m
enableSched = 1

[AG: New Privileged Account Creation]
search = search index=agentgate_demo_data sourcetype=windows:security EventCode=4720 | join user [search EventCode=4732 GroupName=Administrators]
cron_schedule = */15 * * * *
description = [MITRE: T1136.001] [Compliance: SOX, HIPAA] New account created and added to Administrators in close succession.
dispatch.earliest_time = -1h
enableSched = 1

[AG: DNS Tunneling Indicator]
search = search index=agentgate_demo_data sourcetype=dns:query | eval qlen=len(query) | where qlen > 50 | stats count by src_ip
cron_schedule = */10 * * * *
description = [MITRE: T1572] [Compliance: PCI] DNS queries longer than 50 chars (tunneling indicator).
dispatch.earliest_time = -30m
enableSched = 1

[AG: Large Outbound Data Transfer]
search = search index=agentgate_demo_data sourcetype=firewall:netscreen action=allow | stats sum(bytes_out) as total by src_ip, dst_ip | where total > 100000000
cron_schedule = */15 * * * *
description = [MITRE: T1041] [Compliance: PCI, HIPAA] >100MB outbound from a single src/dst pair in window.
dispatch.earliest_time = -1h
enableSched = 1

[AG: RDP from External IP]
search = search index=agentgate_demo_data sourcetype=windows:security EventCode=4624 LogonType=10 | search NOT (src_ip=10.* OR src_ip=192.168.* OR src_ip=172.16.*)
cron_schedule = */5 * * * *
description = [MITRE: T1021.001] [Compliance: PCI, HIPAA] RDP interactive logon from a non-RFC1918 source.
dispatch.earliest_time = -15m
enableSched = 1

[AG: LSASS Memory Access]
search = search index=agentgate_demo_data sourcetype=windows:security EventCode=4688 | search New_Process_Name=*lsass* OR Process_Command_Line=*lsass*
cron_schedule = */10 * * * *
description = [MITRE: T1003.001] [Compliance: PCI] Process spawn referencing LSASS (credential dumping).
dispatch.earliest_time = -30m
enableSched = 1

[AG: Mass File Rename Encryption]
search = search index=agentgate_demo_data sourcetype=windows:security EventCode=4663 | regex ObjectName="\.(encrypted|locked|crypt)$" | stats dc(ObjectName) as files by user | where files > 50
cron_schedule = */5 * * * *
description = [MITRE: T1486] [Compliance: HIPAA, PCI] Single user touching 50+ files with ransomware-style extensions.
dispatch.earliest_time = -15m
enableSched = 1

[AG: Account Lockout Surge]
search = search index=agentgate_demo_data sourcetype=windows:security EventCode=4740 | bin _time span=10m | stats count by _time | where count > 20
cron_schedule = */10 * * * *
description = [MITRE: T1110] [Compliance: SOX] Account lockouts exceeding 20 per 10-minute window.
dispatch.earliest_time = -30m
enableSched = 1

[AG: Service Account Interactive Login]
search = search index=agentgate_demo_data sourcetype=windows:security EventCode=4624 LogonType=2 | search user="svc_*"
cron_schedule = */15 * * * *
description = [MITRE: T1078.002] [Compliance: SOX, PCI] Service account logged in interactively (policy violation).
dispatch.earliest_time = -1h
enableSched = 1
